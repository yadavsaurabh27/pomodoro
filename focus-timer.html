<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Focus Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.10);
      --border-hover: rgba(255,255,255,0.18);
      --text-primary: #f4f4f5;
      --text-secondary: #71717a;
      --purple: #a78bfa;
      --purple-dim: rgba(167,139,250,0.4);
      --green: #34d399;
      --blue: #60a5fa;
      --font: 'DM Sans', system-ui, sans-serif;
    }

    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap');

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem;
      width: 100%;
      max-width: 400px;
    }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 2.5rem;
      border: 0.5px solid var(--border);
    }

    .mode-tab {
      font-size: 13px;
      font-family: var(--font);
      font-weight: 500;
      padding: 7px 20px;
      border-radius: 50px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .mode-tab.active {
      background: rgba(255,255,255,0.11);
      color: var(--text-primary);
    }

    .mode-tab:hover:not(.active) { color: var(--text-primary); }

    /* Ring */
    .ring-wrap {
      position: relative;
      width: 230px;
      height: 230px;
      margin-bottom: 2rem;
    }

    .ring-svg {
      width: 230px;
      height: 230px;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: rgba(255,255,255,0.06);
      stroke-width: 8;
    }

    .ring-fill {
      fill: none;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 659;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
    }

    .time-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .time-num {
      font-family: 'DM Mono', monospace;
      font-size: 50px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -1px;
      line-height: 1;
    }

    .time-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 14px;
      align-items: center;
      margin-bottom: 2rem;
    }

    .btn-main {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 1.5px solid var(--border-hover);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-main:hover { background: var(--surface-hover); }
    .btn-main:active { transform: scale(0.95); }

    .btn-sm {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    .btn-sm:hover { background: var(--surface); color: var(--text-primary); }
    .btn-sm:active { transform: scale(0.95); }

    /* Session dots */
    .sessions-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1.75rem;
    }

    .session-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      transition: background 0.3s, box-shadow 0.3s;
    }

    .session-dot.done { background: #a78bfa; }
    .session-dot.active { background: #c4b5fd; box-shadow: 0 0 8px rgba(167,139,250,0.7); }

    /* Task input */
    .task-input-wrap { width: 100%; max-width: 300px; }

    .task-input {
      width: 100%;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 11px 16px;
      font-size: 14px;
      font-family: var(--font);
      color: var(--text-primary);
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .task-input::placeholder { color: var(--text-secondary); }
    .task-input:focus { border-color: var(--purple-dim); background: rgba(255,255,255,0.07); }

    /* Status */
    .status-msg {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 1rem;
      min-height: 18px;
      text-align: center;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="focus" onclick="setMode('focus')">Focus</button>
    <button class="mode-tab" data-mode="short" onclick="setMode('short')">Short break</button>
    <button class="mode-tab" data-mode="long" onclick="setMode('long')">Long break</button>
  </div>

  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 230 230">
      <circle class="ring-bg" cx="115" cy="115" r="105"/>
      <circle class="ring-fill" id="ring" cx="115" cy="115" r="105" stroke="#a78bfa"/>
    </svg>
    <div class="time-display">
      <div class="time-num" id="timeDisplay">25:00</div>
      <div class="time-label" id="modeLabel">FOCUS</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-sm" title="Reset" onclick="resetTimer()">↺</button>
    <button class="btn-main" id="playBtn" onclick="toggleTimer()">▶</button>
    <button class="btn-sm" title="Skip" onclick="skipSession()">⇥</button>
  </div>

  <div class="sessions-row" id="sessionDots"></div>

  <div class="task-input-wrap">
    <input class="task-input" id="taskInput" type="text" placeholder="What are you working on?"/>
  </div>

  <div class="status-msg" id="statusMsg"></div>
</div>

<script>
  const MODES = {
    focus: { label: 'FOCUS',       secs: 25 * 60, color: '#a78bfa' },
    short: { label: 'SHORT BREAK', secs:  5 * 60, color: '#34d399' },
    long:  { label: 'LONG BREAK',  secs: 15 * 60, color: '#60a5fa' }
  };

  const CIRC = 2 * Math.PI * 105;

  let mode = 'focus';
  let totalSecs = MODES.focus.secs;
  let remaining = totalSecs;
  let running = false;
  let intervalId = null;
  let sessions = 0;
  const MAX_SESSIONS = 4;

  const ring        = document.getElementById('ring');
  const timeDisplay = document.getElementById('timeDisplay');
  const modeLabel   = document.getElementById('modeLabel');
  const playBtn     = document.getElementById('playBtn');
  const statusMsg   = document.getElementById('statusMsg');

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  function updateDisplay() {
    timeDisplay.textContent = formatTime(remaining);
    const pct = remaining / totalSecs;
    ring.style.strokeDashoffset = CIRC * (1 - pct);
    ring.style.stroke = MODES[mode].color;
  }

  function renderDots() {
    const el = document.getElementById('sessionDots');
    el.innerHTML = '';
    for (let i = 0; i < MAX_SESSIONS; i++) {
      const d = document.createElement('div');
      d.className = 'session-dot' +
        (i < sessions ? ' done' :
         i === sessions && mode === 'focus' ? ' active' : '');
      el.appendChild(d);
    }
  }

  function setMode(m) {
    document.querySelectorAll('.mode-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.mode === m));
    mode = m;
    totalSecs = MODES[m].secs;
    remaining = totalSecs;
    modeLabel.textContent = MODES[m].label;
    clearInterval(intervalId);
    running = false;
    playBtn.textContent = '▶';
    statusMsg.textContent = '';
    updateDisplay();
    renderDots();
  }

  function toggleTimer() {
    if (!running) {
      running = true;
      playBtn.textContent = '⏸';
      const task = document.getElementById('taskInput').value.trim();
      statusMsg.textContent = task ? 'Working on: ' + task : 'Stay focused...';
      intervalId = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(intervalId);
          running = false;
          playBtn.textContent = '▶';
          if (mode === 'focus') {
            sessions = Math.min(sessions + 1, MAX_SESSIONS);
            statusMsg.textContent = 'Session complete! Take a break.';
          } else {
            statusMsg.textContent = 'Break over! Ready to focus?';
          }
          remaining = 0;
          renderDots();
        }
        updateDisplay();
      }, 1000);
    } else {
      clearInterval(intervalId);
      running = false;
      playBtn.textContent = '▶';
      statusMsg.textContent = 'Paused.';
    }
  }

  function resetTimer() {
    clearInterval(intervalId);
    running = false;
    remaining = totalSecs;
    playBtn.textContent = '▶';
    statusMsg.textContent = '';
    updateDisplay();
  }

  function skipSession() {
    clearInterval(intervalId);
    running = false;
    remaining = 0;
    playBtn.textContent = '▶';
    if (mode === 'focus') {
      sessions = Math.min(sessions + 1, MAX_SESSIONS);
      statusMsg.textContent = 'Skipped. Take a break!';
    } else {
      statusMsg.textContent = 'Break skipped. Back to work!';
    }
    renderDots();
    updateDisplay();
  }

  // Init
  ring.style.strokeDasharray = CIRC;
  updateDisplay();
  renderDots();
</script>
</body>
</html>
